paths:
    /users:
        get:
            summary: List users
            tags: [Users]
            parameters:
                - in: query
                  name: page
                  schema: { type: integer, minimum: 1, default: 1 }
                - in: query
                  name: limit
                  schema:
                      { type: integer, minimum: 1, maximum: 200, default: 50 }
                - in: query
                  name: search
                  schema: { type: string }
                - in: query
                  name: sort
                  schema:
                      {
                          type: string,
                          enum:
                              [
                                  createdAt,
                                  -createdAt,
                                  name,
                                  -name,
                                  lastLogin,
                                  -lastLogin,
                              ],
                      }
                - in: query
                  name: verified
                  schema: { type: string, enum: [true, false] }
                - in: query
                  name: admin
                  schema: { type: string, enum: [true, false] }
            responses:
                "200":
                    description: Users list
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    users:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/User"
                                    page: { type: integer }
                                    totalPages: { type: integer }
                                    total: { type: integer }
                                    limit: { type: integer }
                "503": { description: Service unavailable }
                "500": { description: Server error }
    /users/stats:
        get:
            summary: User statistics
            tags: [Users]
            responses:
                "200":
                    description: User statistics
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    totalUsers: { type: integer }
                                    activeUsers: { type: integer }
                                    newUsersToday: { type: integer }
                                    premiumUsers: { type: integer }
                                    usersByRole:
                                        {
                                            type: object,
                                            additionalProperties:
                                                { type: integer },
                                        }
                                    recentActivity:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                email: { type: string }
                                                lastLoginAt:
                                                    {
                                                        type: string,
                                                        format: date-time,
                                                    }
                                                updatedAt:
                                                    {
                                                        type: string,
                                                        format: date-time,
                                                    }
                                                role: { type: string }
                                    availableFields:
                                        type: array
                                        items: { type: string }
                                    lastUpdated:
                                        { type: string, format: date-time }
                "503": { description: Service unavailable }
                "500": { description: Server error }
    /users/count:
        get:
            summary: Basic user counts
            tags: [Users]
            responses:
                "200": { description: Counts fetched }
                "503": { description: Service unavailable }
                "500": { description: Server error }