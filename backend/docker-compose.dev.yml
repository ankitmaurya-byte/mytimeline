services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: timeline-backend-dev
    env_file:
      - env.example
    environment:
      NODE_ENV: development
      PORT: 8000
      NPM_CONFIG_PRODUCTION: 'false'
      CHOKIDAR_USEPOLLING: 'true' # drop if not needed
      WATCHPACK_POLLING: 'true' # drop if not needed
    ports:
      - '8000:8000'
    volumes:
      - ./:/app
      - /app/node_modules
    working_dir: /app
    command: >
      sh -c "if [ ! -d node_modules ]; then echo 'Installing deps...'; npm
      install --no-audit --no-fund; fi && npm run dev"
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -qO- http://localhost:8000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
